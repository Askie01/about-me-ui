services:

  about-me-ui:
    image: "askie01/about-me-ui:latest"
    container_name: "about-me-ui"
    ports:
      - "8080:8080"
    tty: true
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - askie-solutions-network

networks:
  askie-solutions-network:
    driver: bridge